<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack Plus Printing – Product Catalog</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #f0ede6; font-family: 'DM Mono', 'Fira Mono', 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

  header { background: #111; border-bottom: 1px solid #2a2a2a; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: 0.15em; color: #e8c84a; }
  .logo-sub { font-size: 11px; color: #666; letter-spacing: 0.2em; margin-top: 2px; }
  .prod-count { font-size: 12px; color: #444; letter-spacing: 0.1em; }

  .layout { display: flex; flex: 1; min-height: 0; height: calc(100vh - 65px); }

  aside { width: 300px; border-right: 1px solid #1e1e1e; background: #111; display: flex; flex-direction: column; overflow: hidden; }
  .search-box { padding: 16px 16px 8px; }
  .search-box input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px 12px; color: #f0ede6; font-size: 12px; outline: none; font-family: inherit; letter-spacing: 0.05em; }
  .search-box input:focus { border-color: #e8c84a44; }
  .cats { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-btn { background: #1a1a1a; color: #888; border: none; border-radius: 3px; padding: 4px 9px; font-size: 10px; cursor: pointer; letter-spacing: 0.08em; font-family: inherit; transition: all 0.15s; }
  .cat-btn.active { background: #e8c84a; color: #0f0f0f; font-weight: 700; }
  .product-list { flex: 1; overflow-y: auto; padding: 0 8px 16px; }
  .product-item { padding: 10px 12px; border-radius: 5px; cursor: pointer; border-left: 3px solid transparent; margin-bottom: 2px; transition: all 0.15s; }
  .product-item:hover { background: #161616; }
  .product-item.active { background: #1e1c14; border-left-color: #e8c84a; }
  .product-item .pname { font-size: 12px; color: #ccc; line-height: 1.4; }
  .product-item.active .pname { color: #e8c84a; }
  .product-item .pmeta { font-size: 10px; color: #555; margin-top: 2px; }

  main { flex: 1; padding: 36px; overflow-y: auto; }
  .empty-state { color: #333; text-align: center; margin-top: 80px; }
  .empty-state .big { font-size: 48px; } .empty-state .msg { font-size: 14px; margin-top: 12px; letter-spacing: 0.15em; }

  .product-header { margin-bottom: 28px; }
  .product-header .cat-label { font-size: 11px; color: #555; letter-spacing: 0.2em; margin-bottom: 6px; }
  .product-header h1 { font-size: 26px; font-weight: 700; color: #f0ede6; }
  .product-header .mat { font-size: 12px; color: #666; margin-top: 6px; }
  .product-header .mat span { color: #aaa; }

  .steps { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
  .step-pill { padding: 5px 14px; border-radius: 2px; font-size: 10px; letter-spacing: 0.12em; background: #1a1a1a; color: #444; transition: all 0.2s; }
  .step-pill.active { background: #e8c84a; color: #0f0f0f; font-weight: 700; }
  .step-pill.done { background: #2a2a1a; color: #e8c84a; }

  .section { margin-bottom: 28px; max-width: 700px; }
  .section-title { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .section-bar { width: 3px; height: 14px; background: #e8c84a; border-radius: 2px; }
  .section-label { font-size: 11px; letter-spacing: 0.2em; color: #888; }
  .section-check { font-size: 10px; color: #e8c84a; }

  .color-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .color-btn { background: #1a1a1a; color: #ccc; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px 16px; font-size: 12px; cursor: pointer; font-family: inherit; letter-spacing: 0.05em; transition: all 0.15s; }
  .color-btn:hover { border-color: #e8c84a44; color: #e8c84a; }
  .color-btn.active { background: #e8c84a; color: #0f0f0f; border-color: #e8c84a; font-weight: 700; }

  .dim-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .dim-field label { font-size: 10px; color: #666; display: block; margin-bottom: 4px; letter-spacing: 0.1em; }
  .dim-field input { width: 90px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px 10px; color: #f0ede6; font-size: 13px; outline: none; font-family: inherit; }
  .dim-field input:focus { border-color: #e8c84a44; }

  .next-btn { margin-top: 14px; background: transparent; color: #e8c84a; border: 1px solid #e8c84a; border-radius: 4px; padding: 7px 18px; font-size: 11px; cursor: pointer; letter-spacing: 0.12em; font-family: inherit; transition: all 0.15s; }
  .next-btn:hover { background: #e8c84a22; }

  .upload-zone { border: 2px dashed #2a2a2a; border-radius: 6px; padding: 28px; text-align: center; cursor: pointer; background: #141414; transition: all 0.2s; }
  .upload-zone:hover { border-color: #e8c84a44; background: #161610; }
  .upload-zone.has-file { background: #1a1e14; border-color: #e8c84a44; }
  .upload-zone .upload-icon { font-size: 28px; }
  .upload-zone .upload-label { font-size: 12px; color: #666; margin-top: 8px; }

  .preview-card { background: #141414; border: 1px solid #1e1e1e; border-radius: 8px; padding: 24px; display: flex; gap: 24px; align-items: flex-start; }
  .preview-visual { width: 160px; height: 160px; background: #1a1a1a; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #222; overflow: hidden; }
  .preview-visual img { width: 100%; height: 100%; object-fit: contain; }
  .preview-visual .big-emoji { font-size: 52px; }
  .preview-visual .color-label { font-size: 9px; color: #555; margin-top: 6px; text-align: center; padding: 0 8px; letter-spacing: 0.06em; }
  .preview-details { flex: 1; }
  .preview-title { font-size: 16px; font-weight: 700; color: #e8c84a; margin-bottom: 12px; }
  .detail-row { display: flex; justify-content: space-between; border-bottom: 1px solid #1e1e1e; padding: 6px 0; font-size: 12px; }
  .detail-row .dk { color: #555; letter-spacing: 0.1em; }
  .detail-row .dv { color: #ccc; }
  .submit-btn { margin-top: 18px; background: #e8c84a; color: #0f0f0f; border: none; border-radius: 4px; padding: 10px 24px; font-size: 12px; font-weight: 700; letter-spacing: 0.15em; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .submit-btn:hover { background: #f0d45a; }

  .no-results { color: #444; font-size: 12px; padding: 16px; text-align: center; }
</style>
<style type="text/css" nonce="">.redacted {
  color: red !important;
}</style></head>

  { name: "Paper Boat", category: "Food Packaging", material: "Paperboard", colors: ["White","Kraft","Custom Printed"], hasDimensions: false },

  { name: "Placemats", category: "Food Packaging", material: "Paper", colors: ["White","Kraft","Custom Printed"], hasDimensions: false },
  { name: "Plastic Bags", category: "Bags", material: "LDPE Plastic", colors: ["Clear","White","Black","Custom Printed"], hasDimensions: false },
  { name: "Plastic Bags: Die Cut Bag", category: "Bags", material: "LDPE/HDPE", colors: ["Clear","White","Black","Custom Printed"], hasDimensions: false },
  { name: "Plastic Bags: Folded Handle Bag", category: "Bags", material: "LDPE", colors: ["White","Black","Clear","Custom Printed"], hasDimensions: false },

  { name: "Printed Dinner Napkins", category: "Napkins", material: "Paper", colors: ["White","Ivory","Custom Printed"], hasDimensions: false },
  { name: "Printed Gift Box Paper", category: "Gift", material: "Coated Paper", colors: ["White","Custom Printed"], hasDimensions: false },
  { name: "Printed Tissue", category: "Gift", material: "Tissue Paper", colors: ["White","Black","Colored","Custom Printed"], hasDimensions: false },
  { name: "Printed Wax Paper", category: "Food Packaging", material: "Waxed Paper", colors: ["White","Kraft","Custom Printed"], hasDimensions: false },
  { name: "Printed Zip Lock Bags", category: "Bags", material: "LDPE / BOPP", colors: ["Clear","White","Custom Printed"], hasDimensions: false },
  { name: "Ribbon", category: "Gift", material: "Satin / Grosgrain", colors: ["White","Black","Gold","Silver","Red","Custom Printed"], hasDimensions: false },
  { name: "Rigid Box", category: "Gift", material: "Rigid Paperboard", colors: ["White","Black","Custom Printed"], hasDimensions: true },
  { name: "Rope/Ribbon Handle Bag", category: "Bags", material: "Paper + Rope", colors: ["White","Black","Kraft","Custom Printed"], hasDimensions: false },
  { name: "Sample", category: "Internal", material: "Various", colors: ["N/A"], hasDimensions: false },
  { name: "Sandwich Paper Bag", category: "Bags", material: "Paper", colors: ["White","Kraft","Custom Printed"], hasDimensions: false },
  { name: "Sealing Film Rolls", category: "Packaging", material: "PET/PE Film", colors: ["Clear","Custom Printed"], hasDimensions: false },
  { name: "Sealing Machines", category: "Equipment", material: "N/A", colors: ["N/A"], hasDimensions: false },
  { name: "Shopping Cart", category: "Equipment", material: "N/A", colors: ["N/A"], hasDimensions: false },
  { name: "Sleeve Printed", category: "Cups", material: "Paper", colors: ["Custom Printed"], hasDimensions: false },
  { name: "Soup Bowls", category: "Food Packaging", material: "Paper / Foam", colors: ["White","Custom Printed"], hasDimensions: false },
  { name: "Stock Tissue", category: "Gift", material: "Tissue Paper", colors: ["White","Black","Red","Blue","Pink","Green"], hasDimensions: false },

  { name: "Tie Tray", category: "Food Packaging", material: "Paperboard / Plastic", colors: ["White","Clear","Custom Printed"], hasDimensions: false },
  { name: "TSB KH Glatt 12x7x24", category: "Bags", material: "Poly", colors: ["White","Custom Printed"], hasDimensions: false },
  { name: "Umbrella", category: "Accessories", material: "Polyester / Nylon", colors: ["Black","Custom Printed"], hasDimensions: false },
  { name: "Utensil Bag", category: "Bags", material: "Paper / Poly", colors: ["White","Kraft","Custom Printed"], hasDimensions: false },
  { name: "Vendor Error", category: "Internal", material: "Various", colors: ["N/A"], hasDimensions: false },
  { name: "Vendors Discount", category: "Internal", material: "Various", colors: ["N/A"], hasDimensions: false },
  { name: "Wave Top Handle Waxed Paper Bag", category: "Bags", material: "Waxed Paper", colors: ["White","Kraft","Custom Printed"], hasDimensions: false },
  { name: "Wet Napkin", category: "Napkins", material: "Non-Woven", colors: ["White","Custom Printed"], hasDimensions: false },
  { name: "Woven Bag", category: "Bags", material: "Woven PP", colors: ["White","Black","Custom Printed"], hasDimensions: false },
  { name: "Wrapping Paper Gift", category: "Gift", material: "Coated Paper", colors: ["White","Kraft","Custom Printed"], hasDimensions: false },
];

const ITEM_VISUALS = { Bags:"🛍️", "Food Packaging":"📦", Napkins:"🧻", Gift:"🎁", Print:"🖨️", Cups:"🥤", Labels:"🏷️", Packaging:"📫", Utensils:"🥢", Equipment:"🔧", Accessories:"☂️", Internal:"🗂️" };
const CATEGORIES = ["All", ...Array.from(new Set(PRODUCTS.map(p => p.category))).sort()];

let state = { selected: null, color: "", customW: "", customH: "", customD: "", design: null, previewUrl: null, step: 1, category: "All" };

document.getElementById("prodCount").textContent = PRODUCTS.length + " PRODUCTS";

// Build category bar
const catBar = document.getElementById("catBar");
CATEGORIES.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "cat-btn" + (cat === "All" ? " active" : "");
  btn.textContent = cat;
  btn.onclick = () => { state.category = cat; document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); filterProducts(); };
  catBar.appendChild(btn);
});

function filterProducts() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const list = document.getElementById("productList");
  list.innerHTML = "";
  const filtered = PRODUCTS.filter(p => p.name.toLowerCase().includes(q) && (state.category === "All" || p.category === state.category));
  if (!filtered.length) { list.innerHTML = '<div class="no-results">No products found</div>'; return; }
  filtered.forEach(p => {
    const div = document.createElement("div");
    div.className = "product-item" + (state.selected?.name === p.name ? " active" : "");
    div.innerHTML = `<div class="pname">${ITEM_VISUALS[p.category]||"📦"} ${p.name}</div><div class="pmeta">${p.category} · ${p.material}</div>`;
    div.onclick = () => selectProduct(p);
    list.appendChild(div);
  });
}

function selectProduct(p) {
  state = { selected: p, color: "", customW: "", customH: "", customD: "", design: null, previewUrl: null, step: 1, category: state.category };
  filterProducts();
  renderMain();
}

function renderMain() {
  const main = document.getElementById("mainPanel");
  const p = state.selected;
  if (!p) { main.innerHTML = '<div class="empty-state"><div class="big">📋</div><div class="msg">SELECT A PRODUCT TO CONFIGURE</div></div>'; return; }

  const stepLabels = ["Color","Size","Design","Preview"];
  const stepsHtml = stepLabels.map((s, i) => {
    let cls = "step-pill";
    if (state.step === i+1) cls += " active";
    else if (state.step > i+1) cls += " done";
    return `<div class="${cls}">${i+1}. ${s.toUpperCase()}${state.step > i+1 ? " ✓" : ""}</div>`;
  }).join("");

  let sectionsHtml = "";

  // Step 1: Color
  if (state.step >= 1) {
    const colorBtns = p.colors.map(c => `<button class="color-btn${state.color===c?" active":""}" onclick="pickColor('${c}')">${c}</button>`).join("");
    sectionsHtml += section("SELECT COLOR", !!state.color, `<div class="color-grid">${colorBtns}</div>`);
  }

  // Step 2: Dimensions
  if (state.step >= 2) {
    const dimContent = `
      <div style="font-size:11px;color:#555;margin-bottom:12px;">Enter measurements in inches</div>
      <div class="dim-row">
        <div class="dim-field"><label>WIDTH</label><input type="number" id="dimW" value="${state.customW}" placeholder="e.g. 10" oninput="state.customW=this.value; updateNextBtn();" /></div>
        <div class="dim-field"><label>HEIGHT</label><input type="number" id="dimH" value="${state.customH}" placeholder="e.g. 14" oninput="state.customH=this.value;" /></div>
        ${p.hasDimensions ? `<div class="dim-field"><label>DEPTH</label><input type="number" id="dimD" value="${state.customD}" placeholder="e.g. 4" oninput="state.customD=this.value;" /></div>` : ""}
      </div>
      ${state.customW ? `<button class="next-btn" onclick="goStep(3)">Next →</button>` : `<button class="next-btn" id="nextDimBtn" disabled style="opacity:0.3;cursor:default;">Enter width to continue</button>`}
    `;
    sectionsHtml += section(p.hasDimensions ? "DIMENSIONS" : "MEASUREMENTS", !!state.customW, dimContent);
  }

  // Step 3: Design
  if (state.step >= 3) {
    const uploadContent = `
      <div class="upload-zone${state.design?" has-file":""}" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">${state.design ? "✅" : "📤"}</div>
        <div class="upload-label">${state.design ? state.design.name : "Click to upload design file (PNG, JPG, PDF, AI, SVG)"}</div>
      </div>
      <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.pdf,.ai,.svg" style="display:none" onchange="handleUpload(this)" />
      <button class="next-btn" onclick="goStep(4)" style="margin-top:12px;">${state.design ? "Preview →" : "Skip & Preview →"}</button>
    `;
    sectionsHtml += section("UPLOAD DESIGN", !!state.design, uploadContent);
  }

  // Step 4: Preview
  if (state.step >= 4) {
    const rows = [
      ["Material", p.material],
      ["Color", state.color || "—"],
      ["Width", state.customW ? state.customW+'"' : "—"],
      ["Height", state.customH ? state.customH+'"' : "—"],
      ...(p.hasDimensions ? [["Depth", state.customD ? state.customD+'"' : "—"]] : []),
      ["Design File", state.design ? state.design.name : "None uploaded"],
    ].map(([k,v]) => `<div class="detail-row"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join("");

    const visual = state.previewUrl
      ? `<img src="${state.previewUrl}" alt="Design" />`
      : `<div class="big-emoji">${ITEM_VISUALS[p.category]||"📦"}</div><div class="color-label">${state.color.toUpperCase()}</div>`;

    const previewContent = `
      <div class="preview-card">
        <div class="preview-visual">${visual}</div>
        <div class="preview-details">
          <div class="preview-title">${p.name}</div>
          ${rows}
          <button class="submit-btn" onclick="submitOrder()">SUBMIT ORDER →</button>
        </div>
      </div>
    `;
    sectionsHtml += section("ORDER SUMMARY", false, previewContent);
  }

  main.innerHTML = `
    <div style="max-width:700px">
      <div class="product-header">
        <div class="cat-label">${p.category.toUpperCase()}</div>
        <h1>${p.name}</h1>
        <div class="mat">Material: <span>${p.material}</span></div>
      </div>
      <div class="steps">${stepsHtml}</div>
      ${sectionsHtml}
    </div>
  `;
}

function section(title, done, content) {
  return `<div class="section">
    <div class="section-title">
      <div class="section-bar"></div>
      <div class="section-label">${title}</div>
      ${done ? '<div class="section-check">✓</div>' : ""}
    </div>
    ${content}
  </div>`;
}

function pickColor(c) {
  state.color = c;
  if (state.step === 1) state.step = 2;
  renderMain();
}

function goStep(n) {
  state.step = n;
  renderMain();
}

function updateNextBtn() {
  const btn = document.getElementById("nextDimBtn");
  const w = document.getElementById("dimW");
  if (btn && w) { if (w.value) { btn.disabled = false; btn.style.opacity = "1"; btn.style.cursor = "pointer"; btn.textContent = "Next →"; btn.onclick = () => goStep(3); } }
  state.customW = w ? w.value : state.customW;
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  state.design = file;
  state.previewUrl = URL.createObjectURL(file);
  renderMain();
}

function submitOrder() {
  alert("✅ Order submitted!\nOur team at Pack Plus Printing will contact you shortly.");
}
